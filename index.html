<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>두근두근 자리 배치 프로그램</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="자리배치">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3476/3476303.png">

    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #e74c3c;
            --success-color: #4CAF50;
            --bg-color: #f0f8ff;
        }

        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1단계: 교사용 비밀 설정 화면 --- */
        #setup-screen { 
            background-color: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%;
            max-width: 800px; 
            margin-top: 20px; 
            border: 3px solid var(--secondary-color); 
        }
        
        .teacher-badge { background: var(--secondary-color); color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        
        .name-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        textarea, input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; transition: border 0.3s; }
        textarea:focus { border-color: var(--primary-color); outline: none; }
        
        .separated-input { background: #fff0f0; border: 2px dashed #ff7675; padding: 15px; border-radius: 12px; margin-top: 20px; }
        
        button.action-btn { background-color: var(--success-color); color: white; border: none; padding: 18px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .preview-container { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; text-align: center; overflow-x: auto; }
        #mode-toggle-btn { background-color: var(--secondary-color); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        #mode-toggle-btn.fixed-mode { background-color: var(--primary-color); }

        .preview-blackboard { background-color: #2c5e4f; color: white; margin: 10px auto; padding: 10px; border: 4px solid #8b5a2b; border-radius: 5px; font-weight: bold; width: 80%; max-width: 400px; }

        #preview-grid { display: grid; gap: 8px; justify-content: center; margin-top: 15px; }
        .preview-cell { background-color: #deb887; width: 55px; height: 55px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 14px; border: 1px solid #cdaa7d; font-weight: bold; }
        .preview-cell.empty { background-color: #e0e0e0; border: 1px dashed #aaa; color: transparent; }
        .preview-cell.fixed { background-color: var(--primary-color); color: white; border: 2px solid #2980b9; font-size: 12px; }

        /* --- 2단계: 학생용 화면 --- */
        #classroom-screen { display: none; width: 100%; max-width: 1100px; padding-bottom: 50px; }
        .blackboard { background-color: #2c5e4f; color: white; padding: 20px; border: 10px solid #8b5a2b; border-radius: 12px; font-size: 28px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        
        .waiting-room { background-color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .student { background-color: #ffb6c1; width: 85px; height: 85px; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; box-shadow: 0 6px 8px rgba(0,0,0,0.15); transition: transform 0.2s; }
        .student:active { transform: scale(0.9); }

        .desk-area { background-color: #fffde7; padding: 35px; border-radius: 20px; border: 3px dashed #ffc107; display: grid; gap: 20px; overflow-x: auto; }
        .desk { background-color: #deb887; height: 90px; border-radius: 10px; display: flex; justify-content: center; align-items: center; flex-direction: column; border: 2px solid #cdaa7d; font-size: 16px; color: rgba(255,255,255,0.8); }
        .desk.occupied { background-color: #fff; border: 3px solid #ffb6c1; color: #333; }
        .desk.fixed-desk { border-color: var(--primary-color); background-color: #ebf5fb; }

        .btn-container { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        .print-btn { background-color: #9b59b6; color: white; border: none; padding: 18px 40px; font-size: 20px; border-radius: 35px; cursor: pointer; font-weight: bold; }

        @media print {
            body { padding: 0; background: white; }
            #setup-screen, #cover-screen, .waiting-room, .btn-container, .teacher-badge { display: none !important; }
            #classroom-screen { display: block !important; }
            .desk-area { border: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="teacher-badge">🔒 교사용 비밀 세팅 (아이패드 최적화)</div>
        <h1 style="text-align:center; margin:0 0 20px 0;">✨ 두근두근 자리 배치</h1>
        
        <div class="name-inputs">
            <div>
                <label>앞자리(1-2열)</label>
                <textarea id="frontStudents" rows="3" placeholder="한 줄에 한 명씩"></textarea>
            </div>
            <div>
                <label>일반 배정</label>
                <textarea id="normalStudents" rows="3"></textarea>
            </div>
            <div>
                <label>뒷자리 선호</label>
                <textarea id="backStudents" rows="3"></textarea>
            </div>
        </div>
        
        <div class="separated-input">
            <label>⚡ 절대 붙으면 안 되는 학생 (예: 김철수-이영희)</label>
            <input type="text" id="separatedStudents" placeholder="쉼표로 여러 쌍 구분">
        </div>
        
        <div style="display: flex; gap: 15px; margin-top:20px;">
            <div style="flex:1">
                <label>가로 칸</label>
                <input type="number" id="cols" value="5" onchange="drawPreviewMap()">
            </div>
            <div style="flex:1">
                <label>세로 줄</label>
                <input type="number" id="rows" value="5" onchange="drawPreviewMap()">
            </div>
        </div>

        <div class="preview
