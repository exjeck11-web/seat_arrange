<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>몽구스 달리기 자리 배치</title>
    <style>
        :root { --primary: #4A90E2; --secondary: #34C759; --bg: #f8f9fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-text-size-adjust: 100%; }
        
        #setup-screen { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        textarea, input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; color: white; touch-action: manipulation; }
        .btn-save { background-color: var(--secondary); }
        .btn-run { background-color: var(--primary); }

        #classroom { display: grid; gap: 10px; margin-top: 20px; justify-content: center; }
        .desk { width: 85px; height: 75px; border: 2px solid #ddd; background: #fff; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 12px; box-sizing: border-box; }
        .desk.occupied { border-color: var(--primary); background-color: #eef6ff; }

        /* 몽구스 아이콘 전용 */
        .mongoose { position: fixed; font-size: 35px; z-index: 9999; pointer-events: none; will-change: transform, top, left; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%) rotate(10deg); } 50% { transform: translate(-50%, -15px) rotate(-10deg); } }
        .running { animation: bounce 0.3s infinite; }

        .student-name { font-size: 13px; font-weight: bold; margin-top: 2px; color: #333; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="text-align:center; color: var(--primary); margin-top:0;">🦦 몽구스 달리기</h2>
        <div class="input-group">
            <label>학생 명단 (쉼표 구분)</label>
            <textarea id="names" rows="3">김몽구, 이슬기, 박혁거세, 최수종, 하희라, 정형돈</textarea>
        </div>
        <div class="input-group">
            <label>고정석 (이름:번호)</label>
            <input type="text" id="fixed" placeholder="예: 김몽구:1">
        </div>
        <div class="input-group">
            <label>가로 분단 수</label>
            <input type="number" id="cols" value="3">
        </div>
        <div class="btn-row">
            <button class="btn-save" onclick="saveToLocal()">💾 저장</button>
            <button class="btn-run" onclick="launchMongoose()">🏃‍♂️ 시작!</button>
        </div>
    </div>

    <div id="classroom"></div>

    <script>
        // 로컬 데이터 불러오기 (아이패드 호환성 강화)
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('mongoose_config');
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('names').value = data.names || '';
                    document.getElementById('fixed').value = data.fixed || '';
                    document.getElementById('cols').value = data.cols || '3';
                } catch(e) { console.error("Data load error"); }
            }
        });

        function saveToLocal() {
            const config = {
                names: document.getElementById('names').value,
                fixed: document.getElementById('fixed').value,
                cols: document.getElementById('cols').value
            };
            localStorage.setItem('mongoose_config', JSON.stringify(config));
            alert("✅ 저장되었습니다!");
        }

        async function launchMongoose() {
            const nameVal = document.getElementById('names').value;
            const students = nameVal.split(',').map(s => s.trim()).filter(s => s !== "");
            const cols = parseInt(document.getElementById('cols').value) || 3;
            
            if(students.length === 0) return alert("학생 이름을 입력해주세요!");

            const classroom = document.getElementById('classroom');
            const setupScreen = document.getElementById('setup-screen');
            
            // 화면 전환 효과
            setupScreen.style.display = 'none';
            classroom.style.display = 'grid';
            classroom.innerHTML = '';
            classroom.style.gridTemplateColumns = `repeat(${cols}, 85px)`;

            for(let i=1; i<=students.length; i++) {
                const d = document.createElement('div');
                d.className = 'desk';
                d.id = `seat-${i}`;
                d.innerHTML = `<span style="color:#eee">${i}</span>`;
                classroom.appendChild(d);
            }

            let seats = Array.from({length: students.length}, (_, i) => i + 1);
            let finalMap = {};

            const fixedStr = document.getElementById('fixed').value;
            if(fixedStr) {
                fixedStr.split(',').forEach(f => {
                    const parts = f.split(':');
                    if(parts.length === 2) {
                        const n = parts[0].trim();
                        const s = parseInt(parts[1].trim());
                        if(n && s) {
                            finalMap[n] = s;
                            seats = seats.filter(num => num !== s);
                        }
                    }
                });
            }

            const others = students.filter(s => !finalMap[s]).sort(() => Math.random() - 0.5);
            others.forEach(s => {
                const randSeat = seats.splice(Math.floor(Math.random() * seats.length), 1)[0];
                finalMap[s] = randSeat;
            });

            // 순차적 실행 (아이패드 부하 방지)
            for(let name of students) {
                await runOneMongoose(name, finalMap[name]);
            }
        }

        function runOneMongoose(name, seatNum) {
            return new Promise(resolve => {
                const seat = document.getElementById(`seat-${seatNum}`);
                const m = document.createElement('div');
                m.className = 'mongoose running';
                m.innerHTML = '🦦';
                
                // 화면 하단 중앙에서 출발
                m.style.left = '50%';
                m.style.top = '100%';
                document.body.appendChild(m);

                const rect = seat.getBoundingClientRect();
                
                // 좌표 계산 보정 (아이패드 스크롤 대응)
                const targetX = rect.left + (rect.width / 2);
                const targetY = rect.top + (rect.height / 2);

                // 애니메이션 실행
                setTimeout(() => {
                    m.style.left = targetX + 'px';
                    m.style.top = targetY + 'px';
                    m.style.transition = 'all 0.8s cubic-bezier(0.25, 0.1, 0.25, 1)';
                }, 50);

                setTimeout(() => {
                    m.remove();
                    seat.classList.add('occupied');
                    seat.innerHTML = `<span>🦦</span><div class="student-name">${name}</div>`;
                    resolve();
                }, 900);
            });
        }
    </script>
</body>
</html>
